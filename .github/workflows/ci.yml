name: CI

on:
  push:
    # Ignore tag pushes so CI does not run when tags are pushed (e.g. releases)
    tags-ignore: ["*"]
  pull_request:
    branches: ["master"]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked --all-groups --no-editable

      - name: Build package
        run: uv build

      - name: Compile source
        run: uv run --no-sync python -m compileall fixinspector tests

      - name: Run tests
        run: uv run --no-sync pytest -q
